version: 2

project_name: groundcover

before:
  hooks:
    - go mod tidy

builds:
  - id: groundcover
    main: ./cmd/groundcover
    binary: groundcover
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/paymog/groundcover-cli/internal/cli.version={{ .Version }}

archives:
  - id: default
    ids:
      - groundcover
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md

checksum:
  name_template: checksums.txt
